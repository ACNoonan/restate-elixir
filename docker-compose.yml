# Pinned to restate 1.6.2 — the SDK speaks service-protocol V5.
services:
  restate:
    image: docker.restate.dev/restatedev/restate:1.6.2
    ports:
      - "8080:8080"  # ingress (curl POST /Greeter/greet here)
      - "9070:9070"  # admin (restate CLI talks to this)
      - "9071:9071"  # node-to-node
    networks:
      - restate-net

  elixir-handler:
    build: .
    # Demo 3: SIGTERM-driven graceful drain. Need enough headroom for
    # in-flight invocations to finish before docker-compose escalates
    # to SIGKILL. The Application's drain grace is 25s; give compose
    # 30s of leeway.
    stop_grace_period: 30s
    networks:
      - restate-net

networks:
  restate-net:
    driver: bridge

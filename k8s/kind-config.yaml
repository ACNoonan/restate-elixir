kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    extraPortMappings:
      # Expose Restate's ingress (NodePort 30080) on host :8080
      - containerPort: 30080
        hostPort: 8080
        protocol: TCP
      # Expose Restate's admin API (NodePort 30070) on host :9070
      - containerPort: 30070
        hostPort: 9070
        protocol: TCP

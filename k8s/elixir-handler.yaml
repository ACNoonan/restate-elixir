# Elixir handler — Bandit on :9080. The image is built locally and
# loaded into the kind node:
#   docker compose build elixir-handler
#   docker tag restate-elixir-elixir-handler:latest restate-elixir-handler:0.1.0
#   kind load docker-image restate-elixir-handler:0.1.0 --name restate-elixir
#
# imagePullPolicy: Never because the image isn't published anywhere.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elixir-handler
  labels: { app: elixir-handler }
spec:
  replicas: 1
  selector:
    matchLabels: { app: elixir-handler }
  template:
    metadata:
      labels: { app: elixir-handler }
    spec:
      containers:
        - name: elixir-handler
          image: restate-elixir-handler:0.1.0
          imagePullPolicy: Never
          ports:
            - { containerPort: 9080, name: http }
          readinessProbe:
            httpGet: { path: /discover, port: 9080 }
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: elixir-handler
spec:
  selector: { app: elixir-handler }
  ports:
    - { port: 9080, targetPort: 9080 }
